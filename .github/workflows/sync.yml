name: Notion Routine Sync

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install notion-client==2.2.1 python-dotenv

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROUTINE_DB_ID: ${{ secrets.ROUTINE_DB_ID }}
          REVIEW_DB_ID: ${{ secrets.REVIEW_DB_ID }}
          ROUTINE_PAGE_ID: ${{ secrets.ROUTINE_PAGE_ID }}
        run: python sync.py
